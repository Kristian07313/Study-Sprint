<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySprint</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Study smarter</p>
        <h1>Welcome to StudySprint</h1>
        <p class="intro">
          A beginner-friendly full-stack starter app for focused study sessions,
          quick reminders, and simple backend-powered features.
        </p>

        <div class="actions">
          <button id="tipButton" type="button">Get a study tip</button>
        </div>

        <div class="card">
          <h2>Today&apos;s study tip</h2>
          <p id="tipText">Press the button to load a tip from the backend.</p>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
